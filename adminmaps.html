<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Rutas PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .login-icon { font-size: 64px; margin-bottom: 20px; }
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: inherit;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn {
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 15px;
            color: white;
            text-align: center;
        }
        .stat-value { font-size: 36px; font-weight: 700; margin-bottom: 5px; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .code-result {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
            border: 2px dashed #667eea;
        }
        .generated-code {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin: 10px 0;
            font-family: monospace;
            letter-spacing: 2px;
        }
        .logout-btn {
            background: #f44336;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th {
            background: #f8f9ff;
            padding: 12px;
            text-align: left;
            font-size: 13px;
            color: #666;
            border-bottom: 2px solid #e0e0e0;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .badge {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .badge-active { background: #4CAF50; color: white; }
        .badge-pending { background: #FF9800; color: white; }
        .badge-expired { background: #f44336; color: white; }
        .quick-codes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .quick-code-btn {
            padding: 10px;
            background: #f8f9ff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s ease;
        }
        .quick-code-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Login Screen -->
        <div id="login-screen">
            <div class="login-card">
                <div class="login-icon">🔐</div>
                <h2 style="margin-bottom: 10px; color: #333;">Panel de Administración</h2>
                <p style="color: #666; margin-bottom: 30px; font-size: 14px;">RouteOptimizer Pro</p>
                
                <div class="form-group">
                    <input 
                        type="email" 
                        id="admin-email" 
                        class="form-input" 
                        placeholder="Email de administrador"
                        autocomplete="email"
                    />
                </div>
                <div class="form-group">
                    <input 
                        type="password" 
                        id="admin-password" 
                        class="form-input" 
                        placeholder="Contraseña"
                        autocomplete="current-password"
                    />
                </div>
                <button class="btn btn-primary" onclick="login()">Ingresar</button>
                
                <div style="margin-top: 20px; padding: 15px; background: #fff3e0; border-radius: 10px; font-size: 13px; color: #e65100;">
                    <strong>🔒 Sistema Seguro</strong><br>
                    Login protegido con Firebase Authentication
                </div>
            </div>
        </div>

        <!-- Admin Panel -->
        <div id="admin-panel" style="display: none;">
            <div class="header">
                <div>
                    <h1>🛵 Panel de Administración</h1>
                    <p style="color: #666; margin-top: 5px; font-size: 14px;">
                        <span id="admin-email-display"></span>
                    </p>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 Cerrar Sesión</button>
            </div>

            <!-- Estadísticas -->
            <div class="stats-grid" id="stats-container">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">Total Códigos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-active">0</div>
                    <div class="stat-label">Activos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-pending">0</div>
                    <div class="stat-label">Sin Activar</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-devices">0</div>
                    <div class="stat-label">Dispositivos</div>
                </div>
            </div>

            <!-- Generar Código -->
            <div class="card">
                <h2 class="card-title">🎫 Generar Nuevo Código</h2>
                
                <div class="form-group">
                    <label class="form-label">Nombre del Cliente</label>
                    <input type="text" id="client-name" class="form-input" placeholder="Ej: Juan Pérez" />
                </div>

                <div class="form-group">
                    <label class="form-label">Duración del Acceso</label>
                    <select id="duration" class="form-select">
                        <option value="1H">1 Hora</option>
                        <option value="3H">3 Horas</option>
                        <option value="1D">1 Día</option>
                        <option value="3D">3 Días</option>
                        <option value="7D">7 Días (1 semana)</option>
                        <option value="15D">15 Días</option>
                        <option value="30D" selected>30 Días (1 mes)</option>
                        <option value="90D">90 Días (3 meses)</option>
                        <option value="180D">180 Días (6 meses)</option>
                        <option value="365D">365 Días (1 año)</option>
                        <option value="UNLIMITED">Ilimitado</option>
                    </select>
                </div>

                <div class="quick-codes">
                    <button class="quick-code-btn" onclick="setDuration('3H')">3H</button>
                    <button class="quick-code-btn" onclick="setDuration('1D')">1D</button>
                    <button class="quick-code-btn" onclick="setDuration('7D')">7D</button>
                    <button class="quick-code-btn" onclick="setDuration('30D')">30D</button>
                </div>

                <button class="btn btn-primary" style="margin-top: 20px;" onclick="generateCode()">
                    🎫 Generar Código
                </button>

                <div id="code-result" style="display: none;" class="code-result">
                    <p style="font-size: 14px; color: #666; margin-bottom: 5px;">Código generado:</p>
                    <div class="generated-code" id="generated-code"></div>
                    <button class="btn btn-primary" style="margin-top: 15px;" onclick="copyCode()">
                        📋 Copiar Código
                    </button>
                </div>
            </div>

            <!-- Lista de Códigos -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 class="card-title" style="margin: 0; border: none;">📋 Códigos Generados</h2>
                    <button class="btn btn-primary" style="width: auto; padding: 10px 20px;" onclick="loadCodes()">
                        🔄 Actualizar
                    </button>
                </div>
                
                <div id="codes-list">
                    <p style="text-align: center; color: #999; padding: 40px;">Cargando...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import AdminService from './admin-service.js';
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const adminService = new AdminService();
        let lastGeneratedCode = '';
        let currentUser = null;

        // ✅ Verificar autenticación al cargar (Firebase maneja todo)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('admin-email-display').textContent = user.email;
                showAdminPanel();
                loadStats();
                loadCodes();
            } else {
                showLoginScreen();
            }
        });

        function showLoginScreen() {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('admin-panel').style.display = 'none';
        }

        function showAdminPanel() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        }

        // ✅ Login SEGURO con Firebase Authentication
        window.login = async function() {
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value;

            if (!email || !password) {
                alert('⚠️ Por favor ingresa email y contraseña');
                return;
            }

            const loginBtn = document.querySelector('#login-screen .btn-primary');
            const originalText = loginBtn.textContent;
            loginBtn.textContent = '🔄 Verificando...';
            loginBtn.disabled = true;

            const result = await adminService.loginAdmin(email, password);

            if (result.success) {
                // Firebase Auth actualizará automáticamente el estado
                console.log('✅ Login exitoso');
            } else {
                alert('❌ Credenciales incorrectas');
                loginBtn.textContent = originalText;
                loginBtn.disabled = false;
                document.getElementById('admin-password').value = '';
            }
        };

        // ✅ Logout SEGURO
        window.logout = async function() {
            if (confirm('¿Seguro que quieres cerrar sesión?')) {
                await adminService.logoutAdmin();
                showLoginScreen();
            }
        };

        // Cargar estadísticas
        window.loadStats = async function() {
            try {
                const stats = await adminService.getStats();
                document.getElementById('stat-total').textContent = stats.totalCodes;
                document.getElementById('stat-active').textContent = stats.active;
                document.getElementById('stat-pending').textContent = stats.generated;
                document.getElementById('stat-devices').textContent = stats.totalDevices;
            } catch (error) {
                console.error('Error cargando estadísticas:', error);
            }
        };

        // Generar código
        window.generateCode = async function() {
            const clientName = document.getElementById('client-name').value.trim();
            const duration = document.getElementById('duration').value;

            if (!clientName) {
                alert('⚠️ Por favor ingresa el nombre del cliente');
                return;
            }

            try {
                const result = await adminService.generateCode(clientName, duration, currentUser.uid);
                
                if (result.success) {
                    lastGeneratedCode = result.code;
                    document.getElementById('generated-code').textContent = result.code;
                    document.getElementById('code-result').style.display = 'block';
                    
                    // Recargar lista y stats
                    await loadCodes();
                    await loadStats();
                    
                    // Limpiar formulario
                    document.getElementById('client-name').value = '';
                } else {
                    alert('❌ Error al generar código');
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        };

        // Copiar código
        window.copyCode = function() {
            navigator.clipboard.writeText(lastGeneratedCode).then(() => {
                alert('✅ Código copiado al portapapeles!');
            });
        };

        // Setear duración
        window.setDuration = function(duration) {
            document.getElementById('duration').value = duration;
        };

        // Cargar códigos
        window.loadCodes = async function() {
            try {
                const codes = await adminService.getAllCodes();
                const container = document.getElementById('codes-list');
                
                if (codes.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">No hay códigos generados</p>';
                    return;
                }

                let html = '<table><thead><tr>';
                html += '<th>Cliente</th><th>Código</th><th>Duración</th><th>Estado</th><th>Generado</th>';
                html += '</tr></thead><tbody>';

                codes.forEach(code => {
                    const statusBadge = getStatusBadge(code);
                    const generatedDate = code.generatedAt ? code.generatedAt.toLocaleDateString('es-PE') : '-';
                    
                    html += `<tr>
                        <td style="font-weight: 600;">${code.clientName}</td>
                        <td style="font-family: monospace; font-size: 12px; color: #667eea;">${code.code}</td>
                        <td>${code.duration}</td>
                        <td>${statusBadge}</td>
                        <td style="color: #999; font-size: 13px;">${generatedDate}</td>
                    </tr>`;
                });

                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error cargando códigos:', error);
                document.getElementById('codes-list').innerHTML = '<p style="text-align: center; color: red; padding: 40px;">Error al cargar códigos</p>';
            }
        };

        function getStatusBadge(code) {
            const now = new Date();
            
            if (code.status === 'active' && code.expiresAt && code.expiresAt > now) {
                const days = Math.floor((code.expiresAt - now) / (24 * 60 * 60 * 1000));
                return `<span class="badge badge-active">✅ ${days}d restantes</span>`;
            } else if (code.status === 'generated') {
                return '<span class="badge badge-pending">⏱️ Sin activar</span>';
            } else {
                return '<span class="badge badge-expired">❌ Expirado</span>';
            }
        }

        // Enter en password
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('admin-password');
            if (passwordInput) {
                passwordInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') login();
                });
            }
        });
    </script>
</body>
</html>
